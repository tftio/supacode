name: Setup macOS build deps
description: Install + cache mise tools and Ghostty build outputs

runs:
  using: composite
  steps:
    - uses: jdx/mise-action@v4
      with:
        version: 2026.3.0
        cache: true
    - name: Authenticate with Tuist
      shell: bash
      run: mise exec -- tuist auth login
    - name: Xcode cache key
      shell: bash
      run: |
        XCODE_VERSION="$(xcodebuild -version | tr '\n' '-' | sed 's/[^A-Za-z0-9._-]/_/g; s/-$//')"
        printf '%s\n' "XCODE_VERSION=$XCODE_VERSION" >> "$GITHUB_ENV"
    - name: Ghostty cache key
      shell: bash
      run: |
        set -euo pipefail
        GHOSTTY_SHA="$(git -C ThirdParty/ghostty rev-parse HEAD)"
        printf '%s\n' "GHOSTTY_SHA=$GHOSTTY_SHA" >> "$GITHUB_ENV"
    - name: Ghostty cache
      id: ghostty_cache
      uses: actions/cache@v5
      with:
        path: .build/ghostty
        key: ${{ runner.os }}-${{ runner.arch }}-xcode-${{ env.XCODE_VERSION }}-ghostty-v2-${{ env.GHOSTTY_SHA }}-${{ hashFiles('.github/actions/setup-macos/action.yml', 'Project.swift', 'scripts/build-ghostty.sh', 'mise.toml', '.gitmodules') }}
    - name: Build ghostty
      if: steps.ghostty_cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        make build-ghostty-xcframework
